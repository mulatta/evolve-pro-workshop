[project]
site_name = "EvolvePro Workshop"
site_description = "EvolvePro 핸즈온 워크숍 가이드"
site_author = "SBEE Lab"

copyright = "Copyright &copy; 2026 SBEE Lab"

nav = [
  { "Home" = "index.md" },
  { "WSL2 설치" = "wsl2.md" },
  { "SSH 설정" = "ssh.md" },
  { "서버 환경" = "server.md" },
  { "EvolvePro 설치" = "install.md" },
  { "데이터 준비" = "data.md" },
  { "PLM 임베딩" = "plm.md" },
  { "EVOLVEpro 실행" = "run.md" },
  { "결과 시각화" = "visualize.md" },
  { "트러블슈팅" = "troubleshooting.md" },
]

[project.theme]
language = "ko"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
